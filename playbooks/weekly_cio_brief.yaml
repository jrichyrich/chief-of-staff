name: weekly_cio_brief
description: Weekly executive brief for CIO (Theresa O'Leary) — parallel data collection + synthesis into strategic one-page brief
inputs:
  - week_ending
  - recipient_email
workstreams:
  - name: okr_snapshot
    prompt: |
      First call refresh_okr_from_sharepoint to pull the latest OKR spreadsheet.
      Then call query_okr_status with summary_only=True for the executive view.
      Then call query_okr_status with blocked_only=True for blockers.
      Return: overall OKR health per objective (OKR 1, 2, 3), any initiatives
      that changed status recently, and all blocked/at-risk items with owners.
      Flag if OKR data is stale (>7 days since last spreadsheet update).

  - name: delegations_and_decisions
    prompt: |
      Pull all active delegations (list_delegations status=active) and
      check_overdue_delegations. Also pull list_pending_decisions and
      search_decisions for recently completed decisions.
      Return: overdue delegations with days overdue, approaching-due items
      (next 5 days), pending decisions >3 days old, and any decisions
      completed this week worth noting. Flag anything blocking others.

  - name: calendar_and_email
    prompt: |
      Search the past 7 days of M365 calendar, email, and Teams for:
      - Key meetings that occurred (especially cross-functional with Dean,
        Jai, Erhan, or involving Theresa)
      - Significant email threads (escalations, decisions made, new initiatives)
      - Teams threads with cross-VP relevance
      - Any outcomes or decisions from meetings this week
      Synthesize into: what happened this week that Theresa should know about.
      Focus on outcomes and strategic significance, not activity lists.

  - name: risk_and_escalation
    prompt: |
      Identify risks and escalation signals from multiple sources:
      - query_memory for "risk blocker escalation" context
      - check_alerts for triggered alert rules
      - Cross-reference: overdue delegations (>5 days), stale decisions
        (>7 days pending), OKR initiatives at "Blocked" or "At Risk" status
      For each risk: state the risk, its business impact, current mitigation,
      and whether CIO intervention is needed.
      If no significant risks: state "No escalations. Operational risk normal."
      with a brief note on what proactive work is keeping things stable.

  - name: people_and_org
    prompt: |
      Check memory for team and organizational context:
      - query_memory for "hiring team org change capacity"
      - query_memory for recent facts about ISP team members
      - Any onboarding, offboarding, role changes, or open headcount
      - Team health signals (wins, culture moments, capacity concerns)
      - Cross-functional org changes affecting ISP (e.g., new VPs, reorgs)
      Return brief team health summary. If nothing notable: "Team stable.
      No staffing changes."

  - name: next_week_preview
    prompt: |
      Look ahead to next week (Mon-Fri):
      - get_calendar_events for the upcoming week with provider_preference=both
      - search_reminders for upcoming deadlines
      - query_memory for upcoming milestones or deliverables
      Identify: high-stakes meetings needing prep, deadlines, decisions
      Theresa will need to weigh in on, and anything requiring advance awareness.
      Return top 3 priorities for next week with context on why each matters.

synthesis:
  prompt: |
    You are writing a weekly executive brief FROM Jason Richards (VP, Security
    Identity & Privacy) TO Theresa O'Leary (CIO) for the week ending $week_ending.

    Synthesize all workstream results into this exact structure:

    # ISP Weekly Brief | Week of [DATE RANGE]

    **Overall: [GREEN / YELLOW / RED]**
    Pillars: IAM [G/Y/R] | ProdSec [G/Y/R] | SecOps [G/Y/R] | Privacy & GRC [G/Y/R]

    ## TL;DR
    2-3 sentences answering: "Is ISP on track, and does Theresa need to do anything?"

    ## Needs from You
    0-3 specific asks with context and urgency. If none: "No asks this week."

    ## Key Wins
    3-5 outcomes (not activities) with metrics where possible. Connect to OKRs.

    ## OKR Progress
    Table with Objective | Status | Delta | Notes for each of the 3 OKRs.
    List blocked/at-risk initiatives below the table.

    ## Risks and Blockers
    2-4 items with risk, impact, mitigation, and whether CIO help is needed.
    If none: explain what proactive work is keeping things stable.

    ## Cross-Functional
    Items involving Dean, Jai, or Erhan's teams — dependencies and coordination.

    ## Next Week Focus
    Top 3 meaty priorities with why each matters.

    TONE RULES:
    - Write AS a strategic VP, not a task reporter
    - Outcomes over activities
    - Interpret significance, don't just list events
    - Show trajectory with trend language
    - Be honest about yellows/reds — all-green signals lack of candor
    - Asks demonstrate strategic maturity, not weakness
    - Target 400-600 words total. One page max.

    Save to ~/Documents/Jarvis/Weekly_Briefs/ with date prefix.

delivery:
  default: email
  options:
    - email
    - inline
